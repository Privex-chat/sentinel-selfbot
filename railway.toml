[build]
  builder = "nixpacks"
  buildCommand = "npm install && npm run build"

[deploy]
  startCommand = "npm start"
  restartPolicyType = "always"
  restartPolicyMaxRetries = 5

[environments.production.variables]
  NODE_ENV = "production"
  API_PORT = "48923"
  DB_PATH = "/data/sentinel.db"
  LOG_LEVEL = "info"
